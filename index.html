<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ATEM Stream Panel</title>
</head>
<body>
  <h2>Ustaw RTMP</h2>
  <input id="url" placeholder="rtmp://server/live"><br>
  <input id="key" placeholder="streamkey"><br>
  <button onclick="save()">Zapisz</button>

  <h3>Presety</h3>
  <button onclick="preset('youtube')">YouTube</button>
  <button onclick="preset('facebook')">Facebook</button>
  <button onclick="preset('rtmp1')">RTMP1</button>

<script>
async function save() {
  const url = document.getElementById("url").value;
  const key = document.getElementById("key").value;

  const res = await fetch("/preset/custom", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({url, key})
  });

  alert((await res.json()).message);
}

async function preset(name) {
  const res = await fetch("/preset/" + name, {method: "POST"});
  alert((await res.json()).status);
}
</script>
</body>
</html>
